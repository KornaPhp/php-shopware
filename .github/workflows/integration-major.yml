name: Integration tests (major)

# Nightly via workflow_call; also opt-in on a PR by adding the `major-tests` label
# (same switch acceptance.yml uses for its major arm).
on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
    contents: read
    id-token: write

jobs:
  phpunit-major-matrix:
    # On PRs the whole matrix only runs when the `major-tests` label is present; nightly (workflow_call) and manual runs are unaffected.
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'major-tests')
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: generate-matrix
        run: |
          MATRIX=$(php .github/bin/generate-phpunit-matrix.php "" "true")
          jq . <<<"$MATRIX"
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$MATRIX" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

  phpunit-major:
    name: "${{ matrix.test.testsuite }}${{ matrix.test.path }}"
    needs:
      - phpunit-major-matrix
    runs-on: ubuntu-24.04
    strategy: ${{ fromJson(needs.phpunit-major-matrix.outputs.matrix) }}
    env:
      APP_ENV: test
      FEATURE_ALL: major
      DATABASE_URL: mysql://root@127.0.0.1:3306/root
      REDIS_URL: redis://localhost:6379
      APP_URL: http://localhost:8000
      APP_SECRET: def00000bb5acb32b54ff8ee130270586eec0e878f7337dc7a837acc31d3ff00f93a56b595448b4b29664847dd51991b3314ff65aeeeb761a133b0ec0e070433bff08e48
      OPENSEARCH_URL: 127.0.0.1:9200
      ADMIN_OPENSEARCH_URL: 127.0.0.1:9200
      BLUE_GREEN_DEPLOYMENT: 1
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      COMPOSER_ROOT_VERSION: 6.7.9999999-dev

    services:
      elasticsearch:
        # Only the Elasticsearch path shard needs OpenSearch, every other shard uses the cheap alpine placeholder instead.
        image: ${{ contains(matrix.test.path, 'Elasticsearch') && matrix.opensearch || 'alpine' }}
        env:
          discovery.type: single-node
          plugins.security.disabled: "true"
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: "yourStrongPassword123!"
        ports:
          - "9200:9200"
      database:
        image: ${{ matrix.db }}
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: shopware
        ports:
          - "3306:3306"
        options: --health-cmd="mysqladmin ping || mariadb-admin ping"
      redis:
        image: redis:alpine
        ports:
          - "6379:6379"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/phpunit-run
        with:
          php-version: ${{ matrix.php }}
          test-path: ${{ matrix.test.path }}
          test-testsuite: ${{ matrix.test.testsuite }}
          needs-opensearch: ${{ contains(matrix.test.path, 'Elasticsearch') }}
          # no codecov-token: the major run's signal is the gate, not Test Analytics

  # single required/monitorable status for the whole major matrix
  integration-major-check:
    # Skip cleanly on unlabeled PRs so they don't get a confusing status; otherwise aggregate the matrix result.
    if: always() && (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'major-tests'))
    needs:
      - phpunit-major
    runs-on: Ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
