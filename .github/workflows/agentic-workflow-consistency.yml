name: Agentic Workflow Consistency

on:
  pull_request:
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/*.lock.yml"
      - ".github/workflows/agentics-maintenance.yml"
      - ".github/workflows/agentic-workflow-consistency.yml"
      - ".github/aw/**"
      - ".github/dependabot.yml"
      - ".gitattributes"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile-check:
    name: gh aw compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install gh-aw
        uses: github/gh-aw-actions/setup-cli@b5cde6c5013569c8b0229dd2d7ffd63eaf2c9ad2 # v0.81.2
        with:
          version: v0.81.2

      - name: Compile agentic workflows
        run: gh aw compile

      - name: Check generated files are up to date
        run: |
          git diff --exit-code -- \
            .gitattributes \
            .github/workflows/agentics-maintenance.yml \
            .github/workflows/bugfixer.lock.yml \
            .github/workflows/triage.lock.yml \
            .github/aw/actions-lock.json
